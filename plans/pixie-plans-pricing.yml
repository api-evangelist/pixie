specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Pixie
providerId: pixie
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Observability
  - Kubernetes
  - eBPF
  - Open Source
  - CNCF
description: Pixie is a CNCF sandbox open-source observability tool for Kubernetes contributed by
  New Relic. The project is licensed under Apache 2.0 and is free to use, whether self-hosted or
  via the hosted Pixie Cloud control plane (community.getcosmic.ai). There is no published paid
  Pixie SKU; commercial managed observability offerings that build on Pixie are sold separately
  by New Relic and other vendors as part of their own platforms. The Pixie project itself does
  not charge for API access.
sources:
  - https://docs.px.dev/about-pixie/what-is-pixie/
  - https://docs.px.dev/about-pixie/faq/
  - https://github.com/pixie-io/pixie
plans:
  - id: pixie-open-source
    name: Pixie - Open Source
    type: freemium
    description: Apache-2.0 licensed open-source distribution of Pixie. Self-host the entire stack
      (Pixie Cloud + vizier) on your own Kubernetes cluster, or use the community-hosted Pixie
      Cloud at no charge. APIs and the PxL scripting interface are free to use; cost is whatever
      compute / storage you allocate to the components.
    entries:
      - label: License
        name: license
        type: flat
        metric: license
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0 (Apache 2.0)'
        userMultiplied: false
      - label: API / PxL Scripting Access
        name: api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Self-Hosted Compute
        name: self_hosted_compute
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: configurable
        unit: 1
        price: bring your own infrastructure
        userMultiplied: false
    elements:
      - name: Pixie API (gRPC / Cloud API)
      - name: PxL Script API
      - name: Plugin System API
      - name: Self-Hosted Pixie Cloud
      - name: Community-Hosted Pixie Cloud
      - name: CLI and Web UI
      - name: Apache 2.0 License
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
